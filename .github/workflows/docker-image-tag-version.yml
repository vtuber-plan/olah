name: Docker Image Build/Publish release image

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      olah_version:
        description: Published Olah version to install from PyPI
        required: true
        default: 0.4.1

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-release-${{ github.event.release.tag_name || github.event.inputs.olah_version }}
  cancel-in-progress: false

jobs:
  build-and-push-docker-image:
    name: Build release Docker image and push to registries
    runs-on: ubuntu-latest

    steps:
      - name: Determine package source and image tags
        env:
          DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/olah
          GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/olah
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG_NAME="${{ github.event.release.tag_name }}"
            VERSION="${TAG_NAME#v}"
            OLAH_SOURCE="https://github.com/${{ github.repository }}/releases/download/${TAG_NAME}/olah-${VERSION}-py3-none-any.whl"
            PUSH_LATEST="true"
          else
            VERSION="${{ github.event.inputs.olah_version }}"
            OLAH_SOURCE="olah==${VERSION}"
            PUSH_LATEST="false"
          fi

          TAGS="${DOCKERHUB_IMAGE}:${VERSION}"$'\n'"${GHCR_IMAGE}:${VERSION}"
          if [[ "${PUSH_LATEST}" == "true" ]]; then
            TAGS="${TAGS}"$'\n'"${DOCKERHUB_IMAGE}:latest"$'\n'"${GHCR_IMAGE}:latest"
          fi

          echo "OLAH_SOURCE=${OLAH_SOURCE}" >> "$GITHUB_ENV"
          echo "OLAH_VERSION=${VERSION}" >> "$GITHUB_ENV"
          {
            echo "IMAGE_TAGS<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/build@pypi/dockerfile
          build-args: |
            OLAH_SOURCE=${{ env.OLAH_SOURCE }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE_TAGS }}

      - name: Print image digest
        run: echo "${{ steps.build.outputs.digest }}"
